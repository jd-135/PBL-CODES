<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile — BIT TeamHub</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shell.js"></script>
<style>
.profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.profile-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(120deg, var(--green-dim), var(--blue-dim));
}
.profile-avatar { position: relative; z-index: 1; margin: 20px auto 0; width: fit-content; }
.profile-avatar img, .profile-avatar > div {
  width: 80px !important; height: 80px !important;
  font-size: 2rem !important;
  border: 3px solid var(--bg) !important;
  margin: auto;
}
.change-photo-btn {
  display: block; width: 100%; margin-top: 10px;
  padding: 6px 10px; font-size: .74rem; font-weight: 600;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text2);
  cursor: pointer; transition: all .18s;
}
.change-photo-btn:hover { border-color: var(--green); color: var(--green); }
.profile-name { font-family: Syne, sans-serif; font-weight: 800; font-size: 1.15rem; margin: 12px 0 4px; }
.profile-email { font-size: .78rem; color: var(--text2); margin-bottom: 4px; }
.profile-role { margin: 8px 0 16px; }
.profile-pts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.prof-pt {
  background: var(--bg3);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.prof-pt .val { font-family: Syne, sans-serif; font-size: 1.4rem; font-weight: 800; }
.prof-pt .lbl { font-size: .65rem; color: var(--text3); font-weight: 500; margin-top: 2px; }
.prof-pt.green .val { color: var(--green); }
.prof-pt.blue  .val { color: var(--blue); }
.profile-links { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.profile-links a {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px;
  background: var(--bg3);
  border-radius: 99px;
  font-size: .75rem;
  color: var(--text2);
  transition: all .18s;
  border: 1px solid var(--border);
}
.profile-links a:hover { color: var(--text); border-color: var(--border2); }

.profile-form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.form-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.skill-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: .75rem;
  color: var(--text2);
}
.skill-tag button { background: none; border: none; color: var(--red); cursor: pointer; font-size: .75rem; padding: 0 1px; }
.skill-input-wrap { display: flex; gap: 8px; margin-top: 8px; }
.section-sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>
<script>
let myData = null;
let skills  = [];

document.addEventListener('DOMContentLoaded', async () => {
  myData = await Shell.init({ page: 'profile', title: 'My Profile' });
  skills = myData.skills || [];
  renderPage();
});

function renderPage() {
  const body = document.getElementById('pageBody');
  body.innerHTML = `
    <div class="page-header">
      <h1>My Profile</h1>
      <p>Manage your personal information and preferences</p>
    </div>
    <div class="profile-layout">
      <!-- Left card -->
      <div>
        <div class="profile-card" id="profilePreview">
          <div class="profile-avatar" id="profileAvatarWrap">
            ${avatar(myData, 80)}
          </div>
          <button class="change-photo-btn" onclick="openPhotoModal()"><i class="fas fa-camera"></i> Change Photo</button>
          <div class="profile-name">${myData.displayName || myData.email.split('@')[0]}</div>
          <div class="profile-email">${myData.email}</div>
          <div class="profile-role"><span class="badge ${myData.role==='admin'?'badge-orange':'badge-green'}">${myData.role==='admin'?'⚡ Admin':'Member'}</span></div>
          <div class="profile-pts">
            <div class="prof-pt green"><div class="val">${myData.activityPoints||0}</div><div class="lbl">Activity Pts</div></div>
            <div class="prof-pt blue"><div class="val">${myData.rewardPoints||0}</div><div class="lbl">Reward Pts</div></div>
          </div>
          ${myData.bio ? `<p style="font-size:.8rem;color:var(--text2);line-height:1.5;margin-bottom:14px;text-align:left;padding:10px;background:var(--bg3);border-radius:8px;">${myData.bio}</p>` : ''}
          <div class="profile-links">
            ${myData.github   ? `<a href="https://github.com/${myData.github}" target="_blank"><i class="fab fa-github"></i> GitHub</a>` : ''}
            ${myData.linkedin ? `<a href="https://linkedin.com/in/${myData.linkedin}" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
            ${myData.phone    ? `<a href="tel:${myData.phone}"><i class="fas fa-phone"></i> ${myData.phone}</a>` : ''}
          </div>
        </div>

        <div class="card" style="margin-top:16px;">
          <div class="card-title mb-4">My Skills</div>
          <div class="skill-tags" id="skillTags"></div>
          <div class="skill-input-wrap">
            <input type="text" class="form-control" id="skillInput" placeholder="Add a skill…" style="flex:1">
            <button class="btn btn-primary btn-sm" onclick="addSkill()"><i class="fas fa-plus"></i></button>
          </div>
        </div>
      </div>

      <!-- Right: edit form -->
      <div class="profile-form-card">
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:1rem;margin-bottom:18px;">Edit Profile</div>
        <div class="form-two-col">
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" class="form-control" id="fName" value="${myData.displayName||''}">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="form-control" id="fPhone" value="${myData.phone||''}" placeholder="+91 …">
          </div>
          <div class="form-group">
            <label>Department</label>
            <select class="form-control" id="fDept">
              ${['','CSE','ECE','EEE','MECH','CIVIL','IT','AIDS','AIML','CSD','MCT'].map(d=>`<option value="${d}" ${myData.department===d?'selected':''}>${d||'Select…'}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Year of Study</label>
            <select class="form-control" id="fYear">
              ${['','1','2','3','4'].map(y=>`<option value="${y}" ${myData.year===y?'selected':''}>${y||'Select…'}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>GitHub Username</label>
            <input type="text" class="form-control" id="fGithub" value="${myData.github||''}" placeholder="username">
          </div>
          <div class="form-group">
            <label>LinkedIn Username</label>
            <input type="text" class="form-control" id="fLinkedin" value="${myData.linkedin||''}" placeholder="username">
          </div>
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea class="form-control" id="fBio" rows="3" placeholder="Tell your team a bit about yourself…">${myData.bio||''}</textarea>
        </div>

        <hr class="section-sep">

        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:.9rem;margin-bottom:14px;">Interests & Goals</div>
        <div class="form-two-col">
          <div class="form-group">
            <label>Primary Interest</label>
            <input type="text" class="form-control" id="fInterest" value="${myData.interest||''}" placeholder="e.g. Web Dev, AI/ML">
          </div>
          <div class="form-group">
            <label>Goal for This Semester</label>
            <input type="text" class="form-control" id="fGoal" value="${myData.goal||''}" placeholder="e.g. Build a project">
          </div>
        </div>

        <div class="form-group">
          <label>Personal Website / Portfolio</label>
          <input type="url" class="form-control" id="fWebsite" value="${myData.website||''}" placeholder="https://…">
        </div>

        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Profile</button>
          <span style="font-size:.75rem;color:var(--text2);align-self:center;">Last updated: ${myData.updatedAt ? formatTime(myData.updatedAt) : 'Never'}</span>
        </div>
      </div>
    </div>

    <!-- Photo URL Modal -->
    <div class="modal-overlay" id="photoModal">
      <div class="modal" style="max-width:460px;">
        <div class="modal-header">
          <h2><i class="fas fa-camera" style="color:var(--green);margin-right:8px;"></i>Change Profile Photo</h2>
          <button class="modal-close" onclick="closePhotoModal()"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="form-group">
          <label>Profile Photo URL</label>
          <input type="url" class="form-control" id="photoURLInput" placeholder="https://i.imgur.com/example.jpg">
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:.78rem;color:var(--text2);line-height:1.6;margin-bottom:16px;">
          <strong style="color:var(--green);">💡 How to get a photo URL:</strong><br>
          • <strong>Imgur:</strong> Upload at <a href="https://imgur.com" target="_blank" style="color:var(--green);">imgur.com</a> → right-click image → Copy image address<br>
          • <strong>Google Photos:</strong> Share photo → copy link (may not work directly)<br>
          • <strong>Any direct .jpg/.png URL</strong> from the web works
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-primary" style="flex:1;" onclick="savePhotoURL()"><i class="fas fa-save"></i> Save Photo</button>
          <button class="btn btn-ghost" onclick="closePhotoModal()">Cancel</button>
        </div>
      </div>
    </div>
  `;

  renderSkills();
  document.getElementById('skillInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addSkill(); }
  });
}

function renderSkills() {
  const el = document.getElementById('skillTags');
  if (!el) return;
  el.innerHTML = skills.map(s => `
    <span class="skill-tag">${s}<button onclick="removeSkill('${s}')">×</button></span>
  `).join('');
}

function addSkill() {
  const input = document.getElementById('skillInput');
  const val = input?.value.trim();
  if (!val || skills.includes(val)) return;
  skills.push(val);
  input.value = '';
  renderSkills();
}

function removeSkill(s) {
  skills = skills.filter(x => x !== s);
  renderSkills();
}

async function saveProfile() {
  const data = {
    displayName: document.getElementById('fName')?.value.trim()     || myData.displayName,
    phone:       document.getElementById('fPhone')?.value.trim()    || '',
    department:  document.getElementById('fDept')?.value            || '',
    year:        document.getElementById('fYear')?.value            || '',
    github:      document.getElementById('fGithub')?.value.trim()   || '',
    linkedin:    document.getElementById('fLinkedin')?.value.trim() || '',
    bio:         document.getElementById('fBio')?.value.trim()      || '',
    interest:    document.getElementById('fInterest')?.value.trim() || '',
    goal:        document.getElementById('fGoal')?.value.trim()     || '',
    website:     document.getElementById('fWebsite')?.value.trim()  || '',
    skills,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('users').doc(myData.uid).update(data);
    Object.assign(myData, data);
    toast('Profile saved!', 'success');
    renderPage();
  } catch (err) {
    toast(readableError(err), 'error');
  }
}

function openPhotoModal() {
  const input = document.getElementById('photoURLInput');
  if (input) input.value = myData.photoURL || '';
  document.getElementById('photoModal').classList.add('show');
  setTimeout(() => input?.focus(), 100);
}

function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('show');
}

async function savePhotoURL() {
  const url = document.getElementById('photoURLInput')?.value.trim();
  if (!url) { toast('Please enter a photo URL', 'error'); return; }
  if (!url.startsWith('http')) { toast('Please enter a valid URL starting with https://', 'error'); return; }

  try {
    await db.collection('users').doc(myData.uid).update({
      photoURL: url,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    myData.photoURL = url;

    // Update topbar avatar immediately
    const topbarAvatar = document.querySelector('.topbar-actions a[href="profile.html"]');
    if (topbarAvatar) topbarAvatar.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;

    toast('Profile photo updated! ✅', 'success');
    closePhotoModal();
    renderPage();
  } catch (err) {
    toast(readableError(err), 'error');
  }
}
</script>
</body>
</html>
